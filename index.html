"use strict";
const W=640,H=360,FLOOR=190;

ctx.imageSmoothingEnabled=false;

// ================= globals =================
let S=null,savedS=null;
let game={};
function resetGame(){game={coins:0,day:0,groomed:0,queue:[],cIdx:-1,
  claudithDone:false,gone:{tub:1,table:1,sign:1,board:1},showJar:false,
  sus:0,up:{},golfMoved:false};}
resetGame();
let parts=[],floats=[];
let pdown=false,mx=-99,my=-99,T=0;

// ================= audio =================
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC}
function beep(f,d,type,v){d=d||0.07;type=type||'square';v=v||0.035;
  const a=ac();if(!a)return;try{
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+d);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sTalk(){beep(420+Math.random()*120,0.04,'square',0.02)}
function sScrub(){beep(900+Math.random()*300,0.03,'sine',0.02)}
function sPop(){beep(1200,0.06,'sine',0.04)}
function sSnip(){beep(1500,0.03,'square',0.03);setTimeout(()=>beep(1100,0.03,'square',0.03),40)}
function sGood(){beep(660,0.07);setTimeout(()=>beep(990,0.1),70)}
function sBad(){beep(150,0.15,'sawtooth',0.04)}
function sCoin(){beep(880,0.06);setTimeout(()=>beep(1320,0.12),70)}
function sWind(){beep(300,0.25,'sawtooth',0.02)}
function sBoing(){beep(220,0.05);setTimeout(()=>beep(440,0.08),50)}
function sAlarm(){beep(520,0.12,'sawtooth',0.04);setTimeout(()=>beep(380,0.12,'sawtooth',0.04),140)}
function sDoor(){beep(180,0.12,'triangle',0.05)}
function sWater(){beep(700,0.05,'sine',0.03);setTimeout(()=>beep(500,0.08,'sine',0.03),60)}

// ================= helpers =================
const R=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function text(s,x,y,col,size,align){
  ctx.font=(size||8)+"px 'Press Start 2P',monospace";
  ctx.textAlign=align||'left';ctx.textBaseline='top';
  ctx.fillStyle=col||'#fff';ctx.fillText(s,x,y);}
function wrap(s,n){
  const out=[];let line='';
  s.split(' ').forEach(w=>{
    if((line+' '+w).trim().length>n){out.push(line.trim());line=w;}
    else line+=' '+w;});
  if(line.trim())out.push(line.trim());return out;}
function box(x,y,w,h,fill,stroke){
  ctx.fillStyle=fill;ctx.fillRect(x+2,y,w-4,h);ctx.fillRect(x,y+2,w,h-4);
  if(stroke){ctx.fillStyle=stroke;
    ctx.fillRect(x+2,y,w-4,2);ctx.fillRect(x+2,y+h-2,w-4,2);
    ctx.fillRect(x,y+2,2,h-4);ctx.fillRect(x+w-2,y+2,2,h-4);}}
function addFloat(x,y,txt,col){floats.push({x,y,txt,col:col||'#ffe66d',life:1.2})}
function puff(x,y,n,col,spd){
  for(let i=0;i<n;i++)parts.push({x,y,vx:R(-1,1)*(spd||30),vy:R(-1.4,0.2)*(spd||30),
    life:R(0.4,0.9),r:R(2,5),col});}
function sparkle(x,y,n){
  for(let i=0;i<n;i++)parts.push({x:x+R(-24,24),y:y+R(-34,10),vx:0,vy:-14,
    life:R(0.5,1),r:R(1,3),col:'#fff7a8',star:1});}
function updateParts(dt){
  parts=parts.filter(p=>{p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;return p.life>0});
  floats=floats.filter(f=>{f.life-=dt;f.y-=20*dt;return f.life>0});}
function drawParts(){
  parts.forEach(p=>{ctx.globalAlpha=clamp(p.life*2,0,1);ctx.fillStyle=p.col;
    const r=Math.max(1,Math.round(p.r));
    if(p.star){ctx.fillRect(p.x-r,p.y,r*2+1,1);ctx.fillRect(p.x,p.y-r,1,r*2+1);}
    else ctx.fillRect(p.x-r/2,p.y-r/2,r,r);});
  ctx.globalAlpha=1;
  floats.forEach(f=>{ctx.globalAlpha=clamp(f.life,0,1);
    text(f.txt,f.x,f.y,f.col,8,'center');});
  ctx.globalAlpha=1;}

// ================= fluffy blob =================
function fluff(cx,cy,rx,ry,seed,smooth){
  for(let yy=-ry;yy<=ry;yy+=1){
    const t=yy/ry;let hw=rx*Math.sqrt(Math.max(0,1-t*t));
    if(!smooth)hw+=Math.sin(yy*1.4+(seed||0)*7)*1.3+Math.sin(yy*3.2+(seed||0)*3)*0.7;
    if(hw<1)continue;
    ctx.fillRect(Math.round(cx-hw),Math.round(cy+yy),Math.round(hw*2),2);}}

// ================= dog sprite =================
// feet at (x,y). f=1 right, -1 left. o: bob,walk,fluff,tongue,bow,hat,monocle,pug,soap,wet
function drawDog(x,y,sc,f,pal,o){
  o=o||{};
  ctx.save();ctx.translate(x,y);ctx.scale(sc*(f<0?-1:1),sc);
  const wk=o.walk||0;
  const bob=o.walk?Math.abs(Math.sin(wk))*1.6:(o.bob?Math.sin(T*4+(pal.seed||0)*2)*1.2:0);
  const fl=o.fluff||1,sd=pal.seed||1,sm=o.pug?1:0;
  const fur=o.wet?(pal.wet||pal.shade):pal.fur;
  const shade=pal.shade;
  // tail (wags when happy/idle)
  const wag=(o.bob||o.tongue)?Math.sin(T*9+sd*3)*2:0;
  ctx.fillStyle=pal.tail||fur;
  if(o.cat){ // long curvy cat tail
    for(let i=0;i<7;i++){const t2=i/6;
      ctx.fillRect(-12-t2*7+Math.sin(T*3+sd)*t2*3,
        -14-bob-t2*20-Math.sin(t2*2.6)*4,3,4);}}
  else if(o.pug)fluff(-13,-24-bob+wag*0.5,3,3,sd+5,1);
  else fluff(-14+wag*0.4,-21-bob-Math.abs(wag)*0.6,4*fl,4.5*fl,sd+5);
  // legs (walk lift)
  ctx.fillStyle=shade;
  [-10,-4,4,9].forEach((lx,i)=>{
    const lift=o.walk?Math.max(0,Math.sin(wk+(i%2)*Math.PI))*3:0;
    ctx.fillRect(lx,-9-lift,3,9+lift-bob);});
  // paw tips
  if(pal.paw){ctx.fillStyle=pal.paw;
    [-10,-4,4,9].forEach((lx,i)=>{
      const lift=o.walk?Math.max(0,Math.sin(wk+(i%2)*Math.PI))*3:0;
      ctx.fillRect(lx,-3-lift,3,3);});}
  // body + belly shading
  ctx.fillStyle=fur;fluff(0,-16-bob,13*fl,9.5*fl,sd,sm);
  ctx.globalAlpha=0.3;ctx.fillStyle=shade;fluff(0,-11-bob,10*fl,4*fl,sd+9,sm);ctx.globalAlpha=1;
  // harness (dogs) or collar+bell (cats)
  if(o.cat){ctx.fillStyle=pal.har;ctx.fillRect(3,-25-bob,9,3);
    ctx.fillStyle='#e8c34a';ctx.fillRect(6,-22-bob,3,3);}
  else{ctx.fillStyle=pal.har;
    ctx.fillRect(2,-24-bob,8,11);ctx.fillRect(-3,-21-bob,14,4);
    ctx.fillStyle='#3d3d42';ctx.fillRect(5,-19-bob,3,2);
    ctx.fillStyle='#e8c34a';ctx.fillRect(6,-13-bob,3,3);} // tag
  // far ear
  if(!o.cat){ctx.fillStyle=pal.ear||shade;fluff(3,-26-bob,4,6.5*fl,sd+2,sm);}
  // head
  ctx.fillStyle=fur;fluff(9,-29-bob,8.5*fl,8*fl,sd+1,o.cat?1:sm);
  // ears: pointy for cats, floppy fluff for dogs
  if(o.cat){
    ctx.fillStyle=fur;
    ctx.fillRect(3,-38-bob,5,3);ctx.fillRect(4,-41-bob,3,3);
    ctx.fillRect(12,-38-bob,5,3);ctx.fillRect(13,-41-bob,3,3);
    ctx.fillStyle='#e8a0b0';
    ctx.fillRect(5,-38-bob,1,2);ctx.fillRect(14,-38-bob,1,2);}
  else{ctx.fillStyle=pal.ear||shade;fluff(4,-27-bob,3.5,6*fl,sd+3,sm);}
  // muzzle
  if(!o.pug&&!o.cat){ctx.fillStyle=pal.muzzle||fur;fluff(15,-26-bob,4,3.5,sd+4,sm);}
  // whiskers
  if(o.cat){ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillRect(16,-28-bob,6,1);ctx.fillRect(16,-25-bob,6,1);}
  // nose
  ctx.fillStyle=o.cat?'#e0788c':'#181414';
  ctx.fillRect(o.pug?14:(o.cat?15:17),-28-bob,3,2);
  // eye (with blink)
  const blink=((T+sd)%4.1)<0.14;
  ctx.fillStyle='#181414';
  if(blink)ctx.fillRect(10.5,-31-bob,3,1);
  else{ctx.fillRect(11,-32-bob,2,2);
    ctx.fillStyle='#fff';ctx.fillRect(12,-32-bob,1,1);}
  if(o.tongue){ctx.fillStyle='#f0788c';ctx.fillRect(16,-24-bob,3,4);}
  if(o.soap){ctx.fillStyle='#eef7fc';
    fluff(-2,-24-bob,6,4,sd+6,1);fluff(8,-35-bob,5,3,sd+7,1);fluff(-8,-14-bob,4,3,sd+8,1);}
  if(o.drip&&Math.random()<0.1)parts.push({x:x+R(-14,14)*sc*(f<0?-1:1),y:y-R(10,30)*sc,
    vx:0,vy:40,life:0.5,r:2,col:'#a8d4f0'});
  if(o.monocle){ctx.strokeStyle='#e8c34a';ctx.lineWidth=1;
    ctx.strokeRect(9.5,-33.5-bob,5,5);
    ctx.beginPath();ctx.moveTo(14,-29-bob);ctx.lineTo(16,-24-bob);ctx.stroke();}
  if(o.hat){ctx.fillStyle='#1c1c22';
    ctx.fillRect(3,-38-bob,13,2);ctx.fillRect(5,-45-bob,9,7);
    ctx.fillStyle='#c33';ctx.fillRect(5,-40-bob,9,2);}
  if(o.bow){ctx.fillStyle=o.bowCol||'#ff5d8f';
    ctx.fillRect(6,-39-bob,4,4);ctx.fillRect(11,-39-bob,4,4);
    ctx.fillStyle='#fff';ctx.fillRect(10,-38-bob,1,2);}
  if(o.potHead){ctx.fillStyle='#b5623c';
    ctx.fillRect(2,-42-bob,16,10);ctx.fillRect(0,-44-bob,20,3);
    ctx.fillStyle='#3f8f4f';ctx.fillRect(7,-50-bob,3,7);ctx.fillRect(11,-48-bob,3,5);}
  ctx.restore();}

// ================= humans =================
function drawAditi(x,y,sc,walk){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const wk=walk||0,bob=walk?Math.abs(Math.sin(wk))*1.4:0;
  ctx.fillStyle='#2b2027';
  ctx.fillRect(-8,-46-bob,16,9);ctx.fillRect(-10,-42-bob,3,20);ctx.fillRect(7,-42-bob,3,20);
  ctx.fillStyle='#d9a06b';ctx.fillRect(-5,-42-bob,10,10);
  ctx.fillStyle='#241a1a';ctx.fillRect(-3,-39-bob,2,2);ctx.fillRect(2,-39-bob,2,2);
  ctx.fillStyle='#b8574f';ctx.fillRect(-1,-34-bob,3,1);
  ctx.fillStyle='#3e8e7e';ctx.fillRect(-8,-32-bob,16,17); // kurti
  ctx.fillStyle='#356e62';ctx.fillRect(-8,-20-bob,16,2);
  ctx.fillStyle='#d9a06b';ctx.fillRect(-11,-30-bob,3,11);ctx.fillRect(8,-30-bob,3,11);
  ctx.fillStyle='#31313d';
  const l1=walk?Math.max(0,Math.sin(wk))*3:0,l2=walk?Math.max(0,-Math.sin(wk))*3:0;
  ctx.fillRect(-5,-15-l1,4,15+l1-bob);ctx.fillRect(2,-15-l2,4,15+l2-bob);
  ctx.fillStyle='#7a4a2f';ctx.fillRect(-6,-2,6,2);ctx.fillRect(1,-2,6,2);
  ctx.restore();}
function drawClaudith(x,y,sc,walk,o){
  o=o||{};
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  const wk=walk||0,bob=walk?Math.abs(Math.sin(wk))*1.4:0;
  ctx.fillStyle='#8a7a6a'; // grey-brown hair + bun
  ctx.fillRect(-7,-48-bob,14,8);ctx.fillRect(-3,-53-bob,8,6);
  ctx.fillStyle='#e0b88c';ctx.fillRect(-5,-44-bob,10,10); // face
  ctx.fillStyle='#241a1a';ctx.fillRect(-3,-41-bob,2,2);ctx.fillRect(2,-41-bob,2,2);
  ctx.strokeStyle='#c8a44a';ctx.lineWidth=1; // glasses
  ctx.strokeRect(-4.5,-42.5-bob,4,4);ctx.strokeRect(1.5,-42.5-bob,4,4);
  ctx.fillStyle='#8a5a4a';ctx.fillRect(-1,-36-bob,3,1);
  ctx.fillStyle='#6d6d7a';ctx.fillRect(-8,-34-bob,16,18); // dress
  ctx.fillStyle='#c8b7e0';ctx.fillRect(-6,-32-bob,12,14); // apron
  ctx.fillStyle='#a897c8';ctx.fillRect(-6,-32-bob,12,2);
  ctx.fillStyle='#e0b88c';ctx.fillRect(-11,-32-bob,3,12);ctx.fillRect(8,-32-bob,3,12);
  ctx.fillStyle='#42424e';
  const l1=walk?Math.max(0,Math.sin(wk))*3:0,l2=walk?Math.max(0,-Math.sin(wk))*3:0;
  ctx.fillRect(-5,-15-l1,4,15+l1-bob);ctx.fillRect(2,-15-l2,4,15+l2-bob);
  ctx.fillStyle='#2e2e36';ctx.fillRect(-6,-2,6,2);ctx.fillRect(1,-2,6,2);
  if(!o.noBroom){ // broom in right hand
    ctx.fillStyle='#a3794e';ctx.fillRect(11,-40-bob,2,38);
    ctx.fillStyle='#d4b45a';ctx.fillRect(8,-4,8,6);}
  ctx.restore();}

// ================= palettes / cast =================
const JAMUN={fur:'#3a3634',shade:'#242120',wet:'#26221f',har:'#c8362e',
  ear:'#2c2826',tail:'#4a4644',seed:3};
const MISRI={fur:'#f3ecdd',shade:'#d8ccb2',wet:'#cfc2a4',har:'#d13a78',
  ear:'#e8d9b8',muzzle:'#ecdfc2',paw:'#e0c290',seed:8};
const DAYS=[

// claudith visit schedule: day, customer index, stage, seconds in
const CSCHED=[{c:1,st:'style',t:1.5},{c:1,st:'dry',t:0.8},{c:2,st:'wash',t:0.9}];
const SHOP=[
 {k:'shampoo',n:'GOLDEN SHAMPOO',p:60,d:'mud melts faster'},
 {k:'dryer',n:'TURBO DRYER',p:80,d:'wider green zone'},
 {k:'scissors',n:'VELVET SCISSORS',p:70,d:'rings close slower'},

 {k:'disco',n:'DISCO BALL',p:50,d:'+2 tip. groovy.'},
 {k:'treats',n:'TREAT REFILL',p:30,d:'+1 tip. morale!'}];

// ================= plants =================
const PLANTS=[
  {x:42,y:FLOOR+152,kind:'palm'},
  {x:150,y:FLOOR+152,kind:'fern'},
  {x:330,y:FLOOR+10,kind:'snake'},
  {x:250,y:52,kind:'hang'},
  {x:470,y:FLOOR+10,kind:'fern2'},
  {x:557,y:FLOOR+150,kind:'monstera'}];
PLANTS.forEach(p=>p.droop=0);
function drawPot(x,y,w,h){
  ctx.fillStyle='#b5623c';ctx.fillRect(x-w/2+2,y-h,w-4,h);
  ctx.fillStyle='#c9764e';ctx.fillRect(x-w/2,y-h,w,4);
  ctx.fillStyle='#8f4a2c';ctx.fillRect(x-w/2+2,y-3,w-4,3);}
function drawPlant(p){
  const x=p.x,y=p.y,dr=p.droop?8:0,g1=p.droop?'#7a9a5c':'#3f8f4f',
        g2=p.droop?'#8fac74':'#54ab63',sway=Math.sin(T*1.5+x)*1.5;
  ctx.save();
  if(p.kind==='monstera'){
    drawPot(x,y,34,22);
    ctx.fillStyle=g1;
    ctx.fillRect(x-2,y-70+dr,4,50);
    fluff(x-20+sway,y-72+dr,14,10,3,1);fluff(x+18+sway,y-80+dr,15,11,5,1);
    fluff(x-6+sway,y-96+dr,16,12,7,1);fluff(x+8,y-56+dr,12,9,9,1);
    ctx.fillStyle=p.droop?'#6a8a50':'#2e7a3e';   // leaf splits
    ctx.fillRect(x-24+sway,y-72+dr,8,2);ctx.fillRect(x+14+sway,y-82+dr,8,2);
    ctx.fillRect(x-10+sway,y-98+dr,8,2);}
  else if(p.kind==='palm'){
    drawPot(x,y,28,18);
    ctx.fillStyle='#a3794e';ctx.fillRect(x-2,y-58+dr,4,42);
    ctx.fillStyle=g1;
    for(let a=-2;a<=2;a++){
      for(let i=0;i<16;i++){
        const t=i/16;
        ctx.fillRect(x+a*11*t+sway*t,y-58+dr-Math.sin(t*2.4)*16+t*t*20*Math.abs(a)/2,3,3);}}}
  else if(p.kind==='fern'||p.kind==='fern2'){
    drawPot(x,y,26,16);
    ctx.fillStyle=g2;
    for(let a=0;a<6;a++){const dir=a%2?1:-1;
      for(let i=0;i<9;i++){const t=i/9;
        ctx.fillRect(x+dir*t*16+sway*t,y-16-a*7+dr+t*10-8,3,3);}}}
  else if(p.kind==='snake'){
    drawPot(x,y,24,14);
    for(let i=-2;i<=2;i++){
      ctx.fillStyle=i%2?g1:'#5aa050';
      ctx.fillRect(x+i*5-1,y-36-Math.abs(i)*-6+dr-(2-Math.abs(i))*8,4,28-Math.abs(i)*4);
      ctx.fillStyle='#cddc6a';ctx.fillRect(x+i*5-1,y-36+dr-(2-Math.abs(i))*8,4,2);}}
  else if(p.kind==='hang'){
    ctx.fillStyle='#8f4a2c';ctx.fillRect(x-12,y,24,10);
    ctx.fillStyle='#5c4326';ctx.fillRect(x-1,0,2,y);
    ctx.fillStyle=g2;
    for(let v=-1;v<=1;v++){
      for(let i=0;i<7;i++){

function mkA(kind,x,y,sc,f,o){return{kind,x,y,sc:sc||1.3,f:f||1,walk:0,vis:1,o:o||{}}}
function drawA(a){
  if(!a.vis)return;
  const o=Object.assign({},a.o,{walk:a.walking?a.walk:0,bob:!a.walking});
  if(a.kind==='aditi')drawAditi(a.x,a.y,a.sc,a.walking?a.walk:0);
  else if(a.kind==='claudith')drawClaudith(a.x,a.y,a.sc,a.walking?a.walk:0,a.o);
  else if(a.kind==='jamun')drawDog(a.x,a.y,a.sc,a.f,JAMUN,o);
  else if(a.kind==='misri')drawDog(a.x,a.y,a.sc,a.f,MISRI,o);
  else drawDog(a.x,a.y,a.sc,a.f,a.kind.pal,Object.assign({},a.kind.opts||{},o));}
function bubble(a,lines){
  const wmax=Math.max(...lines.map(l=>l.length))*6+14;
  let bx=clamp(a.x-wmax/2,6,W-wmax-6);
  const bh=lines.length*9+10;
  let by=a.y-58*a.sc-bh-6;if(by<20)by=20;
  box(bx,by,wmax,bh,'#fffdf2','#c9b98a');
  ctx.fillStyle='#fffdf2';
  ctx.fillRect(clamp(a.x-4,bx+4,bx+wmax-10),by+bh,8,4);
  lines.forEach((l,i)=>text(l,bx+7,by+6+i*9,'#443626',6));}
function scene(bg,actors,steps,next){
  let i=0,cur=null;
  function init(c){
    if(c.s){c.dur=1+c.s[1].length*0.045;S.bub={a:c.s[0],lines:wrap(c.s[1],28)};sTalk();}
    if(c.m)c.m[0].walking=true;}
  function done(){
    if(cur&&cur.m){cur.m[0].walking=false;cur.m[0].walk=0;}
    if(cur&&cur.s)S.bub=null;
    cur=null;i++;}
  S={t:'scene',bub:null,actors,
    update(dt){
      actors.forEach(a=>{if(a.walking)a.walk+=dt*11;});
      if(!cur){
        if(i>=steps.length){next();return;}
        cur=steps[i];init(cur);}
      if(cur.m){
        const a=cur.m[0],tx=cur.m[1],ty=cur.m[2],sp=cur.m[3]||95;
        const d=Math.hypot(tx-a.x,ty-a.y);
        if(d<3){a.x=tx;a.y=ty;done();}
        else{if(Math.abs(tx-a.x)>2)a.f=tx>a.x?1:-1;
          a.x+=(tx-a.x)/d*sp*dt;a.y+=(ty-a.y)/d*sp*dt;}}
      else if(cur.w!==undefined){cur.w-=dt;if(cur.w<=0)done();}
      else if(cur.s){cur.dur-=dt;if(cur.dur<=0)done();}
      else if(cur.x){cur.x();done();}},
    down(){
      if(!cur)return;
      if(cur.m){const a=cur.m[0];a.x=cur.m[1];a.y=cur.m[2];done();}
      else if(cur.s||cur.w!==undefined)done();},
    draw(){
      bg();
      actors.slice().sort((a,b)=>a.y-b.y).forEach(drawA);
      if(S.bub)bubble(S.bub.a,S.bub.lines);
      text('click to skip',W-8,H-12,'rgba(255,255,255,0.35)',5,'right');}};}

      text('lending money to billionaires: cancelled',320,292,'#7a8db0',6,'center');
      text('made with love for Aditi, Jamun & Misri',320,316,'#ff9fc6',6,'center');
      if(Math.sin(T*4)>-0.2)text('- CLICK TO PLAY AGAIN -',320,338,'#ffe66d',7,'center');}};}

// ================= input =================
function toXY(e){
  const r=cv.getBoundingClientRect();
  const sc=Math.min(r.width/W,r.height/H);
  const ox=(r.width-W*sc)/2,oy=(r.height-H*sc)/2;
  return [(e.clientX-r.left-ox)/sc,(e.clientY-r.top-oy)/sc];}
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();const a=ac();if(a&&a.state==='suspended')a.resume();
  pdown=true;[mx,my]=toXY(e);
  if(S&&S.down)S.down(mx,my);});
cv.addEventListener('pointermove',e=>{[mx,my]=toXY(e);
  if(S&&S.move)S.move(mx,my);});
window.addEventListener('pointerup',()=>{pdown=false;if(S&&S.up)S.up();});

// ================= main loop =================
let last=0;
function loop(t){
  const dt=Math.min(0.05,(t-last)/1000)||0.016;last=t;T+=dt;
  if(S&&S.update)S.update(dt);
  updateParts(dt);
  ctx.setTransform(1.5,0,0,1.5,0,0);
  ctx.fillStyle='#141020';ctx.fillRect(0,0,W,H);
  if(S)S.draw();
  drawParts();
  requestAnimationFrame(loop);}
title();
requestAnimationFrame(loop);
</script>
